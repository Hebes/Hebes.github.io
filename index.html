<head>

  <meta charset="UTF-8">
  <title>暗沉の笔记</title>
  <link rel="icon" href="/Image/WebsiteTitle.png" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">

  <!-- 页面内容缓存清理在HTML的head标签里添加如下代码即可 https://blog.csdn.net/jiuyisir/article/details/104942842-->

  <!-- 主题，包括官方和社区制作的。https://docsify.js.org/#/zh-cn/themes -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" title="vue" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css" title="dark" disabled />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/buble.css" title="buble" disabled />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/pure.css" title="pure" disabled />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dolphin.css" title="dolphin" disabled />
  <style>
    nav.app-nav li ul {
      min-width: 100px;
    }

    /* 主题配置: Carbon Ads */
    #carbonads {
      box-shadow: none !important;
      width: auto !important;
    }
  </style>

</head>

<body>
  <!-- 加载显示 -->
  <div data-app id="app">Loading...</div>

  <script>
    // 会返回文档对象（document）的根元素的只读属性
    // https://blog.csdn.net/Li_Ning21/article/details/125558892
    // https://developer.mozilla.org/zh-CN/docs/Web/API/Document/documentElement
    // 纯css主题切换
    var lang = location.hash.match(/#\/(de-de|es|ru-ru|zh-cn)\//);
    if (lang) {
      document.documentElement.setAttribute('lang', lang[1]);
    }

    // 内容 Docsify配置
    window.$docsify = {

      //不跳转
      alias: {
        // '.*?/awesome':
        //   'https://raw.githubusercontent.com/docsifyjs/awesome-docsify/master/README.md',
        // '.*?/changelog':
        //   'https://raw.githubusercontent.com/docsifyjs/docsify/master/CHANGELOG.md',
        // '/.*/_navbar.md': '/_navbar.md',
        // '/es/(.*)':
        //   'https://raw.githubusercontent.com/docsifyjs/docs-es/master/$1',
        // '/de-de/(.*)':
        //   'https://raw.githubusercontent.com/docsifyjs/docs-de/master/$1',
        // '/ru-ru/(.*)':
        //   'https://raw.githubusercontent.com/docsifyjs/docs-ru/master/$1',
        // '/zh-cn/(.*)':
        //   'https://cdn.jsdelivr.net/gh/docsifyjs/docs-zh@master/$1',
        // '/.*/_sidebar.md': '/_sidebar.md' 自己测试
      },

      //切换页面后是否自动跳转到页面顶部。
      auto2top: true,

      //启用封面页。开启后是加载 _coverpage.md 文件，也可以自定义文件名(只能用一个)
      coverpage: true,
      // 自定义文件名
      // coverpage: 'cover.md',
      // 多个封面页
      // coverpage: ['/', '/zh-cn/'],
      // 多个封面页，并指定文件名
      // coverpage: {
      //   '/': 'cover.md',
      //   '/zh-cn/': 'cover.md',
      // },

      // 只在访问主页时加载封面。封面作为首页
      onlyCover: false,

      //执行文档里的 script 标签里的脚本，只执行第一个 script (demo)。 如果 Vue 存在，则自动开启。(用于搜索)
      executeScript: true,

      // 加载自定义侧边栏，参考多页文档。设置为 true 后会加载 _sidebar.md 文件，也可以自定义加载的文件名。https://docsify.js.org/#/zh-cn/configuration?id=loadnavbar
      loadSidebar: true,
      // 加载 summary.md
      // loadSidebar: 'summary.md',

      // 加载自定义导航栏，参考定制导航栏 了解用法。设置为 true 后会加载 _navbar.md 文件，也可以自定义加载的文件名。https://docsify.js.org/#/zh-cn/configuration?id=loadnavbar
      loadNavbar: true,
      // 加载 nav.md
      // loadNavbar: 'nav.md',

      // 小屏设备下合并导航栏到侧边栏。
      mergeNavbar: true,

      // 默认情况下会抓取文档中所有标题渲染成目录，可配置最大支持渲染的标题层级。
      maxLevel: 4,

      // 自定义侧边栏后默认不会再生成目录，你也可以通过设置生成目录的最大层级开启这个功能。
      subMaxLevel: 2,

      // 改变背景颜色
      //el: '#app',

      //右上角的图标的链接
      repo: 'https://github.com/Hebes',

      // 暂时不知道干啥用
      ga: 'UA-106147152-1',
      matomo: {
        host: '//matomo.thunderwave.de',//可以访问 不知道干啥用
        id: 6,
      },

      // 左侧栏的标题
      name: '暗沉の笔记',
      nameLink: {//点击文档标题后跳转的链接地址。 https://blog.csdn.net/weixin_39642619/article/details/111578333
        // '/es/': '#/es/',
        // '/de-de/': '#/de-de/',
        // '/ru-ru/': '#/ru-ru/',
        // '/zh-cn/': '#/zh-cn/',
        '/': '#/',
      },

      // 查找
      search: {
        maxAge: 86400000,//过期时间,单位毫秒,默认一天
        noData: {
          // '/es/': '¡No hay resultados!',
          // '/de-de/': 'Keine Ergebnisse!',
          // '/ru-ru/': 'Никаких результатов!',
          // '/zh-cn/': '没有结果!',
          '/': '没有搜到呦!',//No results 没有结果
        },
        paths: 'auto',
        placeholder: {
          // '/es/': 'Buscar',
          // '/de-de/': 'Suche',
          // '/ru-ru/': 'Поиск',
          // '/zh-cn/': '搜索',
          '/': '搜索',//Search
        },
        depth: 6,
        // pathNamespaces: ['/es', '/de-de', '/ru-ru', '/zh-cn'],// http://www.manongjc.com/detail/64-exhplujncgnglfi.html
      },

    }



  </script>
  <!-- 主要的 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

  <!-- docsify-plug - Carbon -一个插件，让您轻松添加碳广告docsify。https://docsify.js.org/#/zh-cn/awesome?id=plugins https://github.com/waruqi/docsify-plugin-carbon -->
  <script src="//cdn.jsdelivr.net/npm/docsify-plugin-carbon@1"></script>
  
  <!-- 查找用插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- 剪贴板插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- 字数统计插件 -->
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-nginx.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script>
    // Public site only
    if (/docsify/.test(location.host)) {
      document.write(
        '<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/ga.min.js"><\/script>'
      );
      document.write(
        '<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/matomo.min.js"><\/script>'
      );
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>

</body>

</html>
